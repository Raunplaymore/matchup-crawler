name: 일일 맞대결 업데이트

on:
  schedule:
    # 매일 UTC 14:00 (KST 23:00) — 경기 종료 후
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: '날짜 (YYYYMMDD, 비워두면 오늘)'
        default: ''
      delay:
        description: '요청 간격 (ms)'
        default: '3000'

jobs:
  # ── Stage 1: 크롤링 + Staging upsert ──
  crawl-and-stage:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    outputs:
      found: ${{ steps.find-result.outputs.found }}
      file: ${{ steps.find-result.outputs.file }}
      records: ${{ steps.find-result.outputs.records }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Crawl daily matchups (with retry)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DATE="${{ github.event.inputs.date }}"
          DELAY="${{ github.event.inputs.delay || '3000' }}"
          FLAGS="--delay $DELAY"
          if [ -n "$DATE" ]; then FLAGS="$FLAGS --date $DATE"; fi

          # 최대 2회 시도, 실패 시 2분 대기 후 재시도
          for ATTEMPT in 1 2; do
            echo "=== 시도 $ATTEMPT/2 ==="
            if npx tsx scripts/crawl-daily.ts $FLAGS; then
              echo "크롤링 성공 (시도 $ATTEMPT)"
              exit 0
            fi
            if [ "$ATTEMPT" -lt 2 ]; then
              echo "실패 — 120초 대기 후 재시도..."
              sleep 120
            fi
          done
          echo "2회 시도 모두 실패"
          exit 1

      - name: Find daily result file
        id: find-result
        run: |
          FILE=$(ls -1 scripts/daily-*.json 2>/dev/null | head -1)
          if [ -n "$FILE" ]; then
            echo "file=$FILE" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
            RECORDS=$(node -e "const d=require('./${FILE}'); console.log(d.filter(r=>r.stats).length)")
            echo "records=$RECORDS" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to Staging D1 (UPSERT)
        if: steps.find-result.outputs.found == 'true' && steps.find-result.outputs.records != '0'
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_DATABASE_ID: ${{ secrets.CF_DATABASE_ID_STAGING }}
        run: npx tsx scripts/upload-d1.ts --upsert --file "${{ steps.find-result.outputs.file }}"

      - name: Upload daily artifact
        if: steps.find-result.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: daily-matchup-${{ github.event.inputs.date || 'today' }}
          path: scripts/daily-*.json
          retention-days: 30

      - name: Notify staging
        if: steps.find-result.outputs.found == 'true' && steps.find-result.outputs.records != '0'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RECORDS="${{ steps.find-result.outputs.records }}"
          if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d parse_mode="HTML" \
              -d text="📦 <b>[Staging] 일일 맞대결 upsert 완료</b> (${RECORDS}건) — 검증 중" || true
          fi

  # ── Stage 2: Staging 검증 ──
  validate-staging:
    needs: crawl-and-stage
    if: needs.crawl-and-stage.outputs.found == 'true' && needs.crawl-and-stage.outputs.records != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      passed: ${{ steps.validate.outputs.passed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate staging data
        id: validate
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_DATABASE_ID: ${{ secrets.CF_DATABASE_ID_STAGING }}
        run: |
          RESULT=$(npx tsx scripts/upload-d1.ts --validate)
          PASSED=$(echo "$RESULT" | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); console.log(d.passed)")
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"

      - name: Notify validation result
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          PASSED="${{ steps.validate.outputs.passed }}"
          if [ "$PASSED" = "true" ]; then
            EMOJI="✅"; MSG="검증 통과 → Production 반영 중"
          else
            EMOJI="❌"; MSG="검증 실패 — Production 반영 중단"
          fi
          if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d parse_mode="HTML" \
              -d text="${EMOJI} <b>[Staging] 일일 맞대결 ${MSG}</b>" || true
          fi

  # ── Stage 3: Production upsert (자동 — upsert는 비파괴적) ──
  upload-production:
    needs: [crawl-and-stage, validate-staging]
    if: needs.validate-staging.outputs.passed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download daily artifact
        uses: actions/download-artifact@v4
        with:
          name: daily-matchup-${{ github.event.inputs.date || 'today' }}
          path: scripts/

      - name: Upload to Production D1 (UPSERT)
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_DATABASE_ID: ${{ secrets.CF_DATABASE_ID }}
        run: |
          FILE=$(ls -1 scripts/daily-*.json 2>/dev/null | head -1)
          if [ -z "$FILE" ]; then
            echo "결과 파일 없음 — 업로드 스킵"
            exit 0
          fi
          npx tsx scripts/upload-d1.ts --upsert --file "$FILE"

      - name: Notify production complete
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ job.status }}"
          EMOJI=$([[ "$STATUS" == "success" ]] && echo "🚀" || echo "❌")
          RECORDS="${{ needs.crawl-and-stage.outputs.records }}"
          if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d parse_mode="HTML" \
              -d text="${EMOJI} <b>[Production] 일일 맞대결 ${STATUS}</b> (${RECORDS}건)" || true
          fi

  # ── Stage 4: 백필 (최근 3일 실패 자동 재시도) ──
  backfill:
    needs: upload-production
    if: always() && github.event.inputs.date == ''
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check recent failures and dispatch backfill
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=== 최근 3일 백필 체크 ==="

          # 오늘 포함 최근 3일 날짜 생성
          for DAYS_AGO in 1 2 3; do
            TARGET_DATE=$(date -u -d "-${DAYS_AGO} days" +%Y%m%d 2>/dev/null || date -u -v-${DAYS_AGO}d +%Y%m%d)
            echo "확인: ${TARGET_DATE}"

            # 해당 날짜로 성공한 run이 있는지 확인
            FOUND=$(gh run list \
              --workflow="crawl-daily.yml" \
              --json status,conclusion,createdAt,event \
              --limit 30 \
              -R "${{ github.repository }}" \
              | jq -r --arg date "$TARGET_DATE" '
                [.[] | select(
                  (.createdAt | split("T")[0] | gsub("-";"")) == $date
                  and .conclusion == "success"
                )] | length
              ')

            if [ "$FOUND" = "0" ]; then
              echo "  ${TARGET_DATE}: 성공 기록 없음 → 백필 dispatch"
              gh workflow run crawl-daily.yml \
                -f date="$TARGET_DATE" \
                -R "${{ github.repository }}" || echo "  dispatch 실패 (무시)"
            else
              echo "  ${TARGET_DATE}: 성공 확인 (${FOUND}건) → 스킵"
            fi
          done
